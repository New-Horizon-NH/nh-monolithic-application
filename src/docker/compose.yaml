services:
  mysql:
    image: mysql:9.0.1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: P@ssw0rd
      MYSQL_USER: nh-monolithic-application
      MYSQL_PASSWORD: P@ssw0rd
      MYSQL_DATABASE: nh-monolithic-application
    ports:
      - protocol: tcp
        published: 3306
        target: 3306
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pP@ssw0rd" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  influx:
    image: influxdb:2
    restart: always
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_HOST: influx
      DOCKER_INFLUXDB_INIT_USERNAME: nh-monolithic-application
      DOCKER_INFLUXDB_INIT_PASSWORD: P@ssw0rd
      DOCKER_INFLUXDB_INIT_ORG: new-horizon
      DOCKER_INFLUXDB_INIT_BUCKET: nh-monolithic-application
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: P@ssw0rd
    ports:
      - protocol: tcp
        published: 8086
        target: 8086
    healthcheck:
      test: [ "CMD", "curl", "-s", "http://localhost:8086/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  grafana:
    image: grafana/grafana:11.2.2
    restart: always
    ports:
      - protocol: tcp
        published: 3000
        target: 3000
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - influx
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: nh-monolithic-application
      RABBITMQ_DEFAULT_PASS: P@ssw0rd
    ports:
      - protocol: tcp
        published: 5672
        target: 5672  # RabbitMQ default AMQP port
      - protocol: tcp
        published: 15672
        target: 15672 # RabbitMQ management UI port
      - protocol: tcp
        published: 1883
        target: 1883  # MQTT port
    command: >
      sh -c 
      "rabbitmq-plugins enable rabbitmq_mqtt &&
      rabbitmq-plugins enable rabbitmq_web_mqtt && 
      rabbitmq-server"
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server --console-address ":9001" /data
    restart: always
    environment:
      MINIO_ROOT_USER: nh-monolithic-application
      MINIO_ROOT_PASSWORD: P@ssw0rd
    ports:
      - protocol: tcp
        published: 9000
        target: 9000
      - protocol: tcp
        published: 9001
        target: 9001
    volumes:
      - minio-storage:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5
  postgres:
    image: postgres:12.17
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: P@ssw0rd
    ports:
      - protocol: tcp
        published: 5432
        target: 5432
    volumes:
      - postgres-storage:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U keycloak" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  keycloak:
    image: quay.io/keycloak/keycloak:20.0.1
    command: start-dev
    restart: always
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: P@ssw0rd
      KC_DB_SCHEMA: public
      PROXY_ADDRESS_FORWARDING: true
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: P@ssw0rd
    ports:
      - protocol: tcp
        published: 9002
        target: 8080
    depends_on:
      - postgres
    healthcheck:
      test: [ "CMD", "curl", "-f", "localhost:8080/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  keycloak-configurer:
    image: registry-digital.russi.ovh/alpine/alpine-keycloak-cli:0.0.1-SNAPSHOT
    restart: on-failure
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: P@ssw0rd
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./keycloak:/scripts
    entrypoint: ["/bin/sh", "/scripts/configure-all.sh"]

volumes:
  grafana-storage: { }
  minio-storage: { }
  postgres-storage: { }